<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenStreetMap App - Google Maps Alternative</title>

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Auth Modal -->
    <div id="authModal" class="modal">
      <div class="modal-content">
        <div class="auth-header">
          <h2>OpenStreetMap App</h2>
          <p>Sign in to save your favorite places</p>
        </div>

        <div id="authError" class="error-message" style="display: none"></div>

        <div id="loginForm" class="auth-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email" />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              placeholder="Enter your password"
            />
          </div>
          <button id="loginBtn" class="btn btn-primary">Sign In</button>
          <button id="signupBtn" class="btn btn-secondary">
            Create Account
          </button>
        </div>

        <div class="divider">
          <span>OR</span>
        </div>

        <button id="googleSignInBtn" class="btn btn-google">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path
              fill="#4285F4"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            />
            <path
              fill="#34A853"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            />
            <path
              fill="#FBBC05"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            />
            <path
              fill="#EA4335"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            />
          </svg>
          Sign in with Google
        </button>
      </div>
    </div>

    <!-- Main App -->
    <div id="app" class="app-container" style="display: none">
      <!-- Header -->
      <header class="header">
        <div class="header-left">
          <h1>OpenStreetMap</h1>
        </div>

        <div class="header-center">
          <div class="search-container">
            <input
              type="text"
              id="searchInput"
              placeholder="Search for a place..."
              class="search-input"
            />
            <button id="searchBtn" class="search-btn">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
              </svg>
            </button>
          </div>
        </div>

        <div class="header-right">
          <button
            id="currentLocationBtn"
            class="btn btn-icon"
            title="Get current location"
          >
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>

          <div id="userInfo" class="user-info">
            <span id="userEmail"></span>
            <button id="logoutBtn" class="btn btn-secondary">Logout</button>
          </div>
        </div>
      </header>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
          <div class="sidebar-header">
            <h3>Places & Results</h3>
            <button id="toggleSidebar" class="btn btn-icon">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
              </svg>
            </button>
          </div>

          <div class="sidebar-tabs">
            <button id="searchTab" class="tab-btn active">
              Search Results
            </button>
            <button id="savedTab" class="tab-btn">Saved Places</button>
            <button id="poiTab" class="tab-btn">Nearby POI</button>
          </div>

          <div class="sidebar-content">
            <!-- Search Results -->
            <div id="searchResults" class="tab-content active">
              <div class="results-header">
                <input
                  type="text"
                  id="poiFilter"
                  placeholder="Filter POI types..."
                  class="filter-input"
                />
                <button id="refreshPOI" class="btn btn-small">
                  Refresh POI
                </button>
              </div>
              <div id="searchResultsList" class="results-list">
                <p class="empty-state">Search for a place to see results</p>
              </div>
            </div>

            <!-- Saved Places -->
            <div id="savedPlaces" class="tab-content">
              <div class="results-header">
                <button id="addPlaceBtn" class="btn btn-primary">
                  Add Current Location
                </button>
              </div>
              <div id="savedPlacesList" class="results-list">
                <p class="empty-state">No saved places yet</p>
              </div>
            </div>

            <!-- Nearby POI -->
            <div id="nearbyPOI" class="tab-content">
              <div class="results-header">
                <select id="poiTypeSelect" class="filter-select">
                  <option value="">All POI Types</option>
                  <option value="amenity">Amenities</option>
                  <option value="shop">Shops</option>
                  <option value="tourism">Tourism</option>
                  <option value="leisure">Leisure</option>
                  <option value="restaurant">Restaurants</option>
                  <option value="hotel">Hotels</option>
                </select>
                <button id="searchPOI" class="btn btn-small">Search POI</button>
              </div>
              <div id="poiResultsList" class="results-list">
                <p class="empty-state">
                  Click on the map to search for nearby POI
                </p>
              </div>
            </div>
          </div>
        </aside>

        <!-- Map Container -->
        <div class="map-container">
          <div id="map"></div>

          <!-- Map Controls -->
          <div class="map-controls">
            <div id="routeInfo" class="route-info" style="display: none">
              <span class="distance-label">Distance:</span>
              <span id="routeDistance" class="distance-value">--</span>
            </div>

            <button id="routeBtn" class="btn btn-primary" style="display: none">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M3 12h18m-9-9v18"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              Get Route
            </button>

            <button
              id="clearRouteBtn"
              class="btn btn-secondary"
              style="display: none"
            >
              Clear Route
            </button>
          </div>
        </div>
      </main>
    </div>

    <!-- Place Modal -->
    <div id="placeModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Add Place</h3>
          <button class="close-btn">&times;</button>
        </div>
        <form id="placeForm">
          <div class="form-group">
            <label for="placeName">Name *</label>
            <input type="text" id="placeName" required />
          </div>
          <div class="form-group">
            <label for="placeCategory">Category</label>
            <select id="placeCategory">
              <option value="">Select category</option>
              <option value="restaurant">Restaurant</option>
              <option value="hotel">Hotel</option>
              <option value="shop">Shop</option>
              <option value="attraction">Attraction</option>
              <option value="park">Park</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="placeDescription">Description</label>
            <textarea id="placeDescription" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label for="placeAddress">Address</label>
            <input type="text" id="placeAddress" />
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary cancel-btn">
              Cancel
            </button>
            <button type="submit" class="btn btn-primary">Save Place</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none">
      <div class="loading-spinner"></div>
      <p>Loading...</p>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Custom JS -->
    <script src="api_client.js"></script>
    <script src="app.js"></script>
  </body>
</html>
